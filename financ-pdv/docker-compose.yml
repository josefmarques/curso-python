services:
  # Serviço do Banco de Dados PostgreSQL
  postgres:
    image: postgres:16
    container_name: postgres_db
    environment:
      - POSTGRES_USER=zemarques
      - POSTGRES_PASSWORD=mrq831028
      - POSTGRES_DB=fin-pdv
      - TZ=America/Sao_Paulo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432" # Porta padrão do PostgreSQL
    restart: unless-stopped

  # Serviço do pgAdmin 4 (Interface Gráfica via Navegador)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_client
    depends_on:
      - postgres # Garante que o painel só inicie após o banco de dados
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@eletrosil.top # Login para acessar o pgAdmin
      - PGADMIN_DEFAULT_PASSWORD=mrq831028             # Senha para acessar o pgAdmin
      - TZ=America/Sao_Paulo
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80" # Acesse a interface web na porta 5050
    restart: unless-stopped

# Volumes gerenciados pelo Docker para não perder dados ao reiniciar
volumes:
  postgres_data:
  pgadmin_data: